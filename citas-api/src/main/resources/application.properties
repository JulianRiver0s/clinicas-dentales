spring.application.name=citas-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/citas}
spring.datasource.username=${DB_USER:citas}
spring.datasource.password=${DB_PASSWORD:citas}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

server.port=${SERVER_PORT:8080}

app.jwt.secret=${JWT_SECRET:secret}
app.jwt.expiration-hours=6
app.notificaciones.base-url=${NOTIFICACIONES_URL:http://localhost:8081}

management.endpoints.web.exposure.include=health,info

logging.level.com.nelumbo.citas_api=INFO
